<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Anclaje de Origen — Git → Pipeline → Manifiesto IPVC</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#6b7280">Cadena de custodia completa desde el commit de origen hasta el artifact final</text>

  <!-- Git commit hash box -->
  <rect x="370" y="95" width="160" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">commit_hash</text>
  <text x="450" y="138" text-anchor="middle" font-size="12" fill="#92400e">(c₀ — Git, origen)</text>

  <!-- Arrow down from Git to Pipeline -->
  <line x1="450" y1="155" x2="450" y2="195" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pipeline container -->
  <rect x="60" y="200" width="780" height="180" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="80" y="225" font-size="14" font-weight="700" fill="#1d4ed8">PIPELINE</text>

  <!-- Stage: build -->
  <rect x="90" y="250" width="120" height="55" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">build</text>

  <line x1="210" y1="277" x2="255" y2="277" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Checkpoint 1 (anchored) -->
  <rect x="260" y="245" width="110" height="65" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="315" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">CP1</text>
  <text x="315" y="287" text-anchor="middle" font-size="10" fill="#92400e">valida vs c₀</text>
  <text x="315" y="300" text-anchor="middle" font-size="10" fill="#92400e">(anclaje)</text>

  <line x1="370" y1="277" x2="415" y2="277" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage: test -->
  <rect x="420" y="250" width="120" height="55" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="480" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">test</text>

  <line x1="540" y1="277" x2="585" y2="277" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Checkpoint 2 -->
  <rect x="590" y="250" width="90" height="55" rx="6" fill="#e5e7eb" stroke="#4b5563" stroke-width="1.5"/>
  <text x="635" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">CP2</text>

  <line x1="680" y1="277" x2="715" y2="277" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage: deploy -->
  <rect x="720" y="250" width="100" height="55" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="770" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">deploy</text>

  <!-- CP3 below deploy, flowing down then left to manifest -->
  <line x1="770" y1="305" x2="770" y2="345" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="715" y="350" width="110" height="40" rx="6" fill="#e5e7eb" stroke="#4b5563" stroke-width="1.5"/>
  <text x="770" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">CP3</text>

  <!-- Arrow down from Pipeline container to Manifest -->
  <line x1="450" y1="382" x2="450" y2="430" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IPVC Manifest box -->
  <rect x="240" y="435" width="420" height="110" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="462" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Manifiesto IPVC</text>
  <text x="450" y="484" text-anchor="middle" font-size="12" fill="#166534">Valida CP1, CP2, CP3 contra el estado esperado</text>
  <text x="450" y="503" text-anchor="middle" font-size="12" fill="#166534">CP1 valida adicionalmente contra commit_hash_origen (c₀)</text>
  <text x="450" y="522" text-anchor="middle" font-size="11" fill="#15803d" font-style="italic">Almacenado de forma separada — credenciales independientes</text>

  <!-- Dashed feedback line from Manifest back to CP1 to show reference relationship -->
  <path d="M 260 435 C 200 400, 200 320, 260 285" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="150" y="350" font-size="10" fill="#15803d" transform="rotate(-90 150 350)">referencia</text>

  <!-- Legend -->
  <rect x="60" y="565" width="14" height="14" fill="#fde68a" stroke="#d97706"/>
  <text x="80" y="576" font-size="11" fill="#374151">Check-point con anclaje de origen (c₀)</text>

  <rect x="320" y="565" width="14" height="14" fill="#e5e7eb" stroke="#4b5563"/>
  <text x="340" y="576" font-size="11" fill="#374151">Check-point estándar</text>

  <rect x="520" y="565" width="14" height="14" fill="#dcfce7" stroke="#16a34a"/>
  <text x="540" y="576" font-size="11" fill="#374151">Manifiesto IPVC (referencia separada)</text>

  <text x="450" y="605" text-anchor="middle" font-size="11" fill="#9ca3af">Figura 5 — IPVC: Integrity Pipeline Validation and Control · Fernando Flores Alvarado · 2026</text>
</svg>
